<!DOCTYPE html>
<html>

<head>
    <title>
        Positioning
    </title>
    <style>
        div{
            right: 30px;
        }

        div.sticky{
            position: sticky;
            top: 1px;
            left: 20px;
            width: 100px;
            border: 3px solid black;
        }

        div.relative{
            position: relative;
            left: 50px;
            border: 4px black;
        }

        div.absolute{
            position: absolute;
            left: 50px;
            border: 3px darkblue
        }

        div.fixed{
            position: fixed;
            left: 50px;
            border: 4px darkblue;
            top: 0px;
        }
    </style>
</head>

<body>
    <div>No prp</div>
    <div class="sticky">this is a sticky property</div>
    <div class=" relative"> this is relative property
        <div class="absolute">this is absolute property</div>
    </div>
    <div class="fixed">this is fixed property</div>
</body>

</html>
