<!DOCTYPE html>
<html>
    <head>
    <style>
        div {
                right: 30px;
                border: 3px solid ;
            }
        div.absolute {
            position:absolute ;
            left: 50px;
            border: 3px solid;
        }
        div.relative {
            position: relative ;
            left: 100px;
            border: 3px solid;
        }
        div.fixed{
            position:fixed;
            top: 0;
            right: 20px;
            width: 100px;
            border: 3px solid;
        }
        div.sticky{
            position:sticky;
            top: 1;
            right: 20px;
            width: 100px;
            border: 3px solid;
        }
</style>
</head>
<body>

    <h2>POSITIONING</h2>
    <DIV>
        div with no positioning property 
    </DIV>
    <div class= "sticky">
        div with sticky property 
    </div>
    <div class= "relative">
        div with relative property 
    
        <div class= "absolute">
        div with absolute property 
    </div>
    </div>
    <div class= "fixed">
        div with fixed property 
    </div>
