<!DOCTYPE html>
<html>
<head>
<style> 
/* The animation code */
@keyframes example {
  0%   {color: red;}
  15%  {color: yellow;}
  50%  {color: blue;}
  100% {color: green;}
}

/* The element to apply the animation to */
p {
  width: 50px;
  height: 50px;
  background-color: purple;
  animation-name: example; 
  animation-duration: 4s; 
} 

div{
    width: 50px;
  height: 50px;
  animation-name: example;
  animation-duration: 4s; 
}

</style>
</head>
<body>
​<div>
Hi</div>
<p>Hey</p>
</body>
</html>
