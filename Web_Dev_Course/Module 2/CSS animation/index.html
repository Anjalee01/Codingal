<!DOCTYPE html>
<html>
<head>
<style> 
/* The animation code */
@keyframes example {
  0%   {background-color: red;}
  15%  {background-color: yellow;}
  50%  {background-color: blue;}
  100% {background-color: green;}
}

/* The element to apply the animation to */

div{
  background-color: aqua;
    width: 50px;
  height: 50px;
  animation-name: example;
  animation-duration: 4s; 
}

</style>
</head>
<body>
​<div>
Hi</div>
<p>Hey</p>
</body>
</html>
