<!DOCTYPE html>
<html>

<head>
    <title>Methods in Array</title>
</head>

<body>
    <p>Array in JavaScript</p>
    <p id="demo"></p>
    <p id="demo2"></p>

    <script>
        var fruits = ["Banana", "Orange", "Apple", "Mango"];
        document.getElementById("demo").innerHTML = fruits.join("* ");

        document.getElementById("demo2").innerHTML = fruits;
        fruits.pop();
        document.getElementById("demo2").innerHTML = fruits;
    </script>

    <style>
        body {
            background-color: rgb(68, 0, 255);
        }

        p {
            color: rgb(122, 77, 77);
        }
    </style>
</body>

</html>
